<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Breach Defense - 游戏介绍</title>
  <style>
    :root {
      --bg: #0f2546;
      --card: #17335d;
      --text: #eef3ff;
      --sub: #b7c9ea;
      --accent: #f7df4c;
      --link: #8fd3ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #13315d 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.6;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
    }
    h1, h2 { margin: 0 0 12px; line-height: 1.25; }
    h1 { font-size: 34px; }
    h2 { font-size: 22px; color: var(--accent); }
    p { margin: 0 0 12px; color: var(--sub); }
    ul { margin: 0; padding-left: 20px; color: var(--sub); }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(247,223,76,0.14);
      color: var(--accent);
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 10px;
    }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <span class="badge">Arcade Missile Action</span>
      <h1>Breach Defense</h1>
      <p>
        《Breach Defense》是一款高速节奏的单机街机闯关游戏。你将操控小导弹在复杂地形中穿梭，
        通过点击切换飞行方向，躲避障碍并突破防御火力。
      </p>
      <p>
        操作简单，但想要稳定通关并拿到高星评价，需要准确节奏和快速反应。
      </p>
    </section>

    <section class="card">
      <h2>核心特色</h2>
      <ul>
        <li>一键切换方向，易上手但高挑战。</li>
        <li>50 个自动生成关卡，难度逐级提升。</li>
        <li>关卡解锁、星级评价与进度自动存储。</li>
        <li>离线单机，无需联网即可游玩。</li>
        <li>8-bit 风格背景音乐与操作音效，支持开关。</li>
      </ul>
    </section>

    <section class="card">
      <h2>更多信息</h2>
      <p>
        隐私政策请查看：
        <a href="./privacy.html">Privacy Policy</a>
      </p>
    </section>
  </main>
</body>
</html>
